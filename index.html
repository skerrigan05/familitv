<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamiliTV - Canales de Chile</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // Cargar config.js con anti-cache para siempre tener la URL del tunel actual
        document.write('<script src="config.js?t=' + new Date().getTime() + '"><\/script>');
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #888;
            font-size: 0.9rem;
        }
        
        /* Grid de canales */
        .grid-container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .grid-title {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #aaa;
        }
        
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        
        .channel-card {
            aspect-ratio: 16/9;
            background: #0f0f23;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .channel-card:hover {
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.3);
        }
        
        .channel-card.active {
            border-color: #4CAF50;
            box-shadow: 0 0 20px rgba(76,175,80,0.3);
        }
        
        .channel-number {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(255,255,255,0.1);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .channel-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        
        .channel-name {
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .live-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Player */
        .player-section {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 20px;
            display: none;
        }
        
        .player-section.active {
            display: block;
        }
        
        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        .player-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .channel-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .info-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .info-text h2 {
            font-size: 1.1rem;
            margin-bottom: 3px;
        }
        
        .status {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: #333;
        }
        
        .status.live {
            background: #4CAF50;
            color: white;
        }
        
        .status.loading {
            background: #ff9800;
            color: black;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #e30613;
            color: white;
        }
        
        .btn-primary:hover {
            background: #c00510;
        }
        
        .btn-secondary {
            background: #333;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #444;
        }
        
        .error-message {
            background: #d9534f;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        
        /* Botones de navegación transparentes - no tapar controles del video */
        .channel-nav {
            position: absolute;
            top: 50px;          /* dejar espacio arriba */
            bottom: 90px;       /* dejar espacio abajo para controles nativos */
            width: 25%;         /* mas ancho para facilitar click en TV */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0.25;      /* siempre visibles para TV/control remoto */
            transition: opacity 0.3s, background 0.3s;
            z-index: 10;        /* por debajo de los controles nativos del video */
            font-size: 3rem;
            color: rgba(255,255,255,0.95);
            text-shadow: 0 2px 15px rgba(0,0,0,0.9);
            user-select: none;
            pointer-events: auto;
            border-radius: 12px;
            outline: none;
        }

        .player-wrapper:hover .channel-nav,
        .channel-nav:focus {
            opacity: 0.7;
        }

        .channel-nav:hover,
        .channel-nav:focus-visible,
        .channel-nav.active {
            opacity: 0.95 !important;
            background: rgba(255,255,255,0.15);
        }

        .channel-nav-prev {
            left: 0;
            padding-left: 20px;
            justify-content: flex-start;
        }

        .channel-nav-next {
            right: 0;
            padding-right: 20px;
            justify-content: flex-end;
        }

        /* En fullscreen, mas visibles y anchos para control remoto */
        .player-wrapper:fullscreen .channel-nav,
        .player-wrapper:-webkit-full-screen .channel-nav {
            opacity: 0.45;
            bottom: 90px;
            top: 50px;
            width: 30%;
            font-size: 4rem;
        }

        .player-wrapper:fullscreen .channel-nav:focus,
        .player-wrapper:-webkit-full-screen .channel-nav:focus,
        .player-wrapper:fullscreen .channel-nav.active,
        .player-wrapper:-webkit-full-screen .channel-nav.active {
            opacity: 0.95;
        }
        
        @media (max-width: 600px) {
            .channel-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>FamiliTV</h1>
        <p>Canales de televisión chilenos en vivo</p>
    </div>

    <!-- Grid de canales -->
    <div class="grid-container" id="gridSection">
        <div class="grid-title">Selecciona un canal</div>
        <div class="channel-grid" id="channelGrid">
            <!-- Canales se cargan dinámicamente -->
        </div>
    </div>

    <!-- Player -->
    <div class="player-section" id="playerSection">
        <div class="player-wrapper" id="playerWrapper">
            <video id="video" controls playsinline></video>
            <!-- Indicador de canal para TV -->
            <div class="tv-channel-indicator" id="channelIndicator"></div>
            <!-- Botones transparentes para cambiar canal (fullscreen) -->
            <div class="channel-nav channel-nav-prev" id="navPrev" title="Canal anterior" tabindex="0">&#10094;</div>
            <div class="channel-nav channel-nav-next" id="navNext" title="Canal siguiente" tabindex="0">&#10095;</div>
        </div>
        
        <div class="player-controls">
            <div class="channel-info">
                <div class="info-logo" id="playerLogo">TVN</div>
                <div class="info-text">
                    <h2 id="playerChannel">TVN Chile</h2>
                    <span class="status loading" id="playerStatus">Cargando...</span>
                </div>
            </div>
            <div>
                <button class="btn btn-secondary" onclick="showGrid()">← Volver</button>
                <button class="btn btn-primary" onclick="reloadStream()">Recargar</button>
            </div>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
    </div>

    <script>
        let channels = [];
        let currentChannel = null;
        let hls = null;
        const video = document.getElementById('video');

        // Cargar canales al iniciar - AUTO-PLAY CHV (Chilevisión) por defecto
        async function loadChannels() {
            try {
                const res = await fetch('/api/channels');
                const data = await res.json();
                if (data.success) {
                    channels = data.channels;
                    renderGrid();
                    
                    // AUTO-INICIAR: Buscar Chilevisión (chv) y reproducir automáticamente
                    const chvChannel = channels.find(c => c.id === 'chv');
                    if (chvChannel && chvChannel.hasStream) {
                        console.log('[App] Auto-iniciando Chilevisión...');
                        setTimeout(() => playChannel('chv'), 500);
                    } else {
                        // Fallback: primer canal disponible
                        const firstAvailable = channels.find(c => c.hasStream);
                        if (firstAvailable) {
                            console.log('[App] Auto-iniciando primer canal:', firstAvailable.id);
                            setTimeout(() => playChannel(firstAvailable.id), 500);
                        }
                    }
                }
            } catch (e) {
                console.error('Error cargando canales:', e);
            }
        }

        // Renderizar grilla
        function renderGrid() {
            const grid = document.getElementById('channelGrid');
            grid.innerHTML = channels.map(ch => `
                <div class="channel-card ${ch.hasStream ? '' : 'disabled'}" 
                     onclick="playChannel('${ch.id}')"
                     style="--ch-color: ${ch.color}">
                    <div class="channel-number">${ch.number}</div>
                    ${ch.hasStream ? '<div class="live-dot"></div>' : ''}
                    <div class="channel-logo" style="background: ${ch.color}30; color: ${ch.color}">
                        ${ch.name.substring(0, 2).toUpperCase()}
                    </div>
                    <div class="channel-name">${ch.name}</div>
                </div>
            `).join('');
        }

        // Reproducir canal
        async function playChannel(channelId) {
            const channel = channels.find(c => c.id === channelId);
            if (!channel || !channel.hasStream) return;
            
            currentChannel = channel;
            
            // Mostrar indicador de canal
            showChannelIndicator(channel.name);
            
            // Cambiar vista
            document.getElementById('gridSection').style.display = 'none';
            document.getElementById('playerSection').classList.add('active');
            
            // Actualizar info
            document.getElementById('playerLogo').textContent = channel.name.substring(0, 2).toUpperCase();
            document.getElementById('playerLogo').style.background = channel.color + '30';
            document.getElementById('playerLogo').style.color = channel.color;
            document.getElementById('playerChannel').textContent = channel.name;
            setStatus('loading', 'Cargando...');
            
            // Cargar stream
            await loadStream(channel.proxyUrl);
        }

        // Cargar stream en player
        async function loadStream(proxyUrl) {
            hideError();
            console.log('[Player] Cargando:', proxyUrl);
            setStatus('loading', 'Cargando stream...');
            
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            try {
                if (Hls.isSupported()) {
                    console.log('[Player] Usando HLS.js');

                    hls = new Hls({
                        enableWorker: false,
                        lowLatencyMode: false,
                        debug: false,
                        capLevelToPlayerSize: true,
                        startLevel: -1,
                        abrEwmaDefaultEstimate: 500000,
                        abrBandWidthFactor: 0.95,
                        abrBandWidthUpFactor: 0.7,
                        maxBufferLength: 30,
                        maxMaxBufferLength: 60,
                        liveSyncDurationCount: 3,
                        liveMaxLatencyDurationCount: 10,
                        fragLoadPolicy: {
                            default: {
                                maxTimeToFirstByteMs: 10000,
                                maxLoadTimeMs: 20000,
                                timeoutRetry: {
                                    maxNumRetry: 4,
                                    retryDelayMs: 1000,
                                    maxRetryDelayMs: 8000
                                },
                                errorRetry: {
                                    maxNumRetry: 4,
                                    retryDelayMs: 1000,
                                    maxRetryDelayMs: 8000
                                }
                            }
                        },
                        playlistLoadPolicy: {
                            default: {
                                maxTimeToFirstByteMs: 10000,
                                maxLoadTimeMs: 20000,
                                timeoutRetry: {
                                    maxNumRetry: 3,
                                    retryDelayMs: 1000,
                                    maxRetryDelayMs: 8000
                                },
                                errorRetry: {
                                    maxNumRetry: 3,
                                    retryDelayMs: 1000,
                                    maxRetryDelayMs: 8000
                                }
                            }
                        },
                        xhrSetup: function(xhr, url) {
                            xhr.withCredentials = false;
                        }
                    });

                    hls.loadSource(proxyUrl);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                        console.log('[Player] Manifest cargado, calidades:', data.levels.length);
                        video.play().catch(e => {
                            console.log('[Player] Autoplay bloqueado:', e.message);
                        });
                        setStatus('live', 'EN VIVO');
                    });
                    
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        console.error('[Player] HLS Error:', data.type, data.details);
                        
                        // Si es error de red, bajar calidad automaticamente si es posible
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            const currentLevel = hls.currentLevel;
                            if (currentLevel > 0) {
                                console.log('[Player] Bajando calidad por inestabilidad de red...');
                                hls.currentLevel = currentLevel - 1;
                                hls.loadLevel = currentLevel - 1;
                            }
                        }
                        
                        if (data.fatal) {
                            switch(data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    console.log('[Player] Error de red fatal, reintentando...');
                                    showError('Red inestable, reintentando...');
                                    // Forzar nivel mas bajo si hay disponibles
                                    if (hls.levels && hls.levels.length > 1) {
                                        hls.currentLevel = 0;
                                        hls.loadLevel = 0;
                                    }
                                    setTimeout(() => hls.startLoad(), 2000);
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    console.log('[Player] Error de media, recuperando...');
                                    hls.recoverMediaError();
                                    break;
                                default:
                                    console.error('[Player] Error fatal:', data);
                                    showError('Error al reproducir: ' + data.details);
                                    setStatus('error', 'Error');
                                    break;
                            }
                        }
                    });
                    
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    console.log('[Player] Usando HLS nativo');
                    video.src = proxyUrl;
                    video.addEventListener('loadedmetadata', () => {
                        video.play();
                        setStatus('live', 'EN VIVO');
                    });
                    video.addEventListener('error', (e) => {
                        console.error('[Player] Error nativo:', e);
                        showError('Error al cargar el stream');
                    });
                } else {
                    throw new Error('Tu navegador no soporta reproducción HLS');
                }
            } catch (e) {
                console.error('[Player] Error:', e);
                showError('Error: ' + e.message);
            }
        }

        // Volver a grilla
        function showGrid() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.src = '';
            
            document.getElementById('playerSection').classList.remove('active');
            document.getElementById('gridSection').style.display = 'block';
            currentChannel = null;
        }

        // Recargar stream actual
        function reloadStream() {
            if (currentChannel) {
                loadStream(currentChannel.proxyUrl);
            }
        }

        // Cambiar canal (anterior/siguiente) - con indicador TV
        function changeChannel(direction) {
            if (!currentChannel || channels.length === 0) return;
            
            const currentIndex = channels.findIndex(c => c.id === currentChannel.id);
            let newIndex = currentIndex + direction;
            
            // Wrap around
            if (newIndex < 0) newIndex = channels.length - 1;
            if (newIndex >= channels.length) newIndex = 0;
            
            const newChannel = channels[newIndex];
            if (newChannel && newChannel.hasStream) {
                showChannelIndicator(newChannel.name);
                playChannel(newChannel.id);
            }
        }
        
        // Mostrar indicador de canal en pantalla (para TV)
        function showChannelIndicator(name) {
            const indicator = document.getElementById('channelIndicator');
            if (indicator) {
                indicator.textContent = name + ' - EN VIVO';
                indicator.classList.add('show');
                setTimeout(() => indicator.classList.remove('show'), 3000);
            }
        }
        
        function nextChannel() {
            changeChannel(1);
        }
        
        function prevChannel() {
            changeChannel(-1);
        }
        
        // Fullscreen toggle
        function toggleFullscreen() {
            const wrapper = document.getElementById('playerWrapper');
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen().catch(e => console.log('Fullscreen error:', e));
            } else {
                document.exitFullscreen();
            }
        }
        
        // Teclas de navegación optimizadas para TV / control remoto
        document.addEventListener('keydown', function(e) {
            const playerActive = document.getElementById('playerSection').classList.contains('active');
            
            // En la grilla: Enter/OK selecciona canal, flechas navegan
            if (!playerActive) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    // Seleccionar primer canal disponible si no hay selección
                    const firstAvailable = channels.find(c => c.hasStream);
                    if (firstAvailable) playChannel(firstAvailable.id);
                }
                return;
            }
            
            // En el player: controles de TV
            switch(e.key) {
                case 'ArrowLeft':
                case 'Backspace':
                case 'Escape':
                    e.preventDefault();
                    showGrid();
                    break;
                case 'ArrowUp':
                case 'PageUp':
                    e.preventDefault();
                    prevChannel();
                    break;
                case 'ArrowDown':
                case 'PageDown':
                    e.preventDefault();
                    nextChannel();
                    break;
                case 'f':
                case 'F':
                case 'Enter':  // OK en muchos controles remoto
                    e.preventDefault();
                    toggleFullscreen();
                    break;
                case ' ':  // Play/Pause
                    e.preventDefault();
                    if (video.paused) video.play(); else video.pause();
                    break;
            }
        });

        // Helpers
        function setStatus(state, text) {
            const el = document.getElementById('playerStatus');
            el.className = 'status ' + state;
            el.textContent = text;
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setStatus('error', 'Error');
        }

        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }

        // Iniciar cuando DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            console.log('[App] Iniciando FamiliTV...');
            
            // Event listeners para botones de navegación
            const navPrev = document.getElementById('navPrev');
            const navNext = document.getElementById('navNext');
            
            if (navPrev) {
                const goPrev = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('[Nav] Anterior');
                    prevChannel();
                };
                navPrev.addEventListener('click', goPrev);
                navPrev.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') goPrev(e);
                });
            }
            
            if (navNext) {
                const goNext = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('[Nav] Siguiente');
                    nextChannel();
                };
                navNext.addEventListener('click', goNext);
                navNext.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') goNext(e);
                });
            }
            
            // Doble click en video = fullscreen
            video.addEventListener('dblclick', toggleFullscreen);
            
            // Click en zonas del video para cambiar canal (izquierda/anterior, derecha/siguiente)
            const playerWrapper = document.getElementById('playerWrapper');
            if (playerWrapper) {
                playerWrapper.addEventListener('click', function(e) {
                    // Solo si estamos en player activo y no se hizo click en un boton de nav
                    if (!document.getElementById('playerSection').classList.contains('active')) return;
                    if (e.target.closest('.channel-nav')) return;
                    
                    const rect = playerWrapper.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const width = rect.width;
                    
                    // Zona izquierda 40% = anterior, derecha 40% = siguiente, centro 20% = nada
                    if (x < width * 0.4) {
                        console.log('[TV Click] Zona izquierda - canal anterior');
                        highlightNav('navPrev');
                        prevChannel();
                    } else if (x > width * 0.6) {
                        console.log('[TV Click] Zona derecha - canal siguiente');
                        highlightNav('navNext');
                        nextChannel();
                    }
                });
            }
            
            function highlightNav(id) {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.add('active');
                    setTimeout(() => el.classList.remove('active'), 300);
                }
            }
            
            // Cargar canales
            loadChannels();
        });
    </script>
</body>
</html>
