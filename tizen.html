<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamiliTV - Tizen</title>
    <!-- HLS.js 1.0.10: mas estable en Tizen 5.x/8.x que @latest -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.0.10"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        #app { position: relative; width: 100%; height: 100%; }
        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 1;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            padding: 40px;
        }
        #overlay.hidden { display: none; }
        h1 { font-size: 2.2rem; margin-bottom: 20px; color: #4CAF50; }
        .row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 10px 0;
            max-width: 900px;
        }
        .btn {
            min-width: 160px;
            padding: 18px 24px;
            font-size: 1.1rem;
            background: #1a237e;
            color: #fff;
            border: 3px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn:focus, .btn.focused {
            border-color: #4CAF50;
            background: #283593;
        }
        .btn.active-channel {
            background: #2e7d32;
            border-color: #4CAF50;
        }
        #urlInput {
            width: 100%;
            max-width: 600px;
            padding: 16px;
            font-size: 1rem;
            border: 2px solid #444;
            border-radius: 6px;
            background: #111;
            color: #fff;
            margin-bottom: 12px;
        }
        #status {
            margin-top: 16px;
            font-size: 0.95rem;
            color: #aaa;
            text-align: center;
        }
        #status.error { color: #ff5252; }
        #status.ok { color: #69f0ae; }
        #help {
            position: absolute;
            bottom: 20px;
            left: 0; right: 0;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            z-index: 5;
        }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.4rem;
            color: #4CAF50;
            z-index: 20;
            display: none;
        }
    </style>
</head>
<body>
    <div id="app">
        <video id="video" autoplay playsinline></video>
        <div id="loading">Cargando...</div>
        <div id="overlay">
            <h1>FamiliTV - Tizen</h1>
            <input id="urlInput" type="text" placeholder="URL del backend (ej: https://xxx.trycloudflare.com)" value="https://optimization-antarctica-holly-automobile.trycloudflare.com">
            <div class="row">
                <button class="btn" id="btnConectar" onclick="connect()">Conectar / Actualizar</button>
            </div>
            <div class="row" id="channelRow"></div>
            <div id="status">Usa las flechas del control remoto y ENTER para seleccionar.</div>
        </div>
        <div id="help">Flechas: navegar | Enter: seleccionar | Back: mostrar/ocultar menu</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const channelRow = document.getElementById('channelRow');
        const statusEl = document.getElementById('status');
        const urlInput = document.getElementById('urlInput');
        const loading = document.getElementById('loading');

        let baseUrl = localStorage.getItem('familitv_baseurl') || urlInput.value || '';
        urlInput.value = baseUrl;
        let hls = null;
        let currentChannel = null;
        let channels = [];
        let focusedIndex = 0;
        let buttons = [];

        function setStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = type || '';
        }

        function getBackendUrl() {
            let u = urlInput.value.trim();
            if (!u) u = baseUrl;
            return u.replace(/\/$/, '');
        }

        async function connect() {
            const backend = getBackendUrl();
            if (!backend) {
                setStatus('Ingresa la URL del backend', 'error');
                return;
            }
            baseUrl = backend;
            localStorage.setItem('familitv_baseurl', baseUrl);
            setStatus('Conectando a ' + backend + '...');
            try {
                const res = await fetch(backend + '/api/channels?t=' + Date.now(), { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                channels = (data.channels || []).filter(c => c.active !== false);
                renderChannels();
                setStatus('Conectado. ' + channels.length + ' canales disponibles.', 'ok');
            } catch (e) {
                setStatus('Error de conexion: ' + e.message, 'error');
                console.error(e);
            }
        }

        function renderChannels() {
            channelRow.innerHTML = '';
            channels.forEach((ch, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn channel-btn';
                btn.textContent = ch.number + '. ' + ch.name;
                btn.dataset.index = idx;
                btn.onclick = () => playChannel(idx);
                channelRow.appendChild(btn);
            });
            buttons = Array.from(document.querySelectorAll('.btn'));
            focusedIndex = 0;
            if (buttons.length) buttons[0].classList.add('focused');
        }

        function playChannel(idx) {
            const ch = channels[idx];
            if (!ch) return;
            currentChannel = ch;
            const streamUrl = baseUrl + '/proxy/' + ch.id + '/stream.m3u8';
            setStatus('Reproduciendo: ' + ch.name);
            overlay.classList.add('hidden');
            loading.style.display = 'block';

            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 30,
                    liveSyncDurationCount: 3,
                    xhrSetup: function(xhr) {
                        xhr.setRequestHeader('Accept', '*/*');
                    }
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    loading.style.display = 'none';
                    video.play().catch(e => console.log('Autoplay bloqueado:', e));
                    setStatus('Reproduciendo: ' + ch.name, 'ok');
                });
                hls.on(Hls.Events.ERROR, function(event, data) {
                    console.error('HLS error:', data);
                    if (data.fatal) {
                        loading.style.display = 'none';
                        setStatus('Error HLS en ' + ch.name + ': ' + data.type, 'error');
                        overlay.classList.remove('hidden');
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    loading.style.display = 'none';
                    video.play();
                });
            } else {
                loading.style.display = 'none';
                setStatus('Navegador no soporta HLS.js', 'error');
                overlay.classList.remove('hidden');
            }

            // Marcar canal activo
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active-channel'));
            const btn = document.querySelector('.channel-btn[data-index="' + idx + '"]');
            if (btn) btn.classList.add('active-channel');
        }

        function updateFocus(dir) {
            if (!buttons.length) return;
            buttons[focusedIndex].classList.remove('focused');
            focusedIndex += dir;
            if (focusedIndex < 0) focusedIndex = buttons.length - 1;
            if (focusedIndex >= buttons.length) focusedIndex = 0;
            buttons[focusedIndex].classList.add('focused');
            buttons[focusedIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        document.addEventListener('keydown', function(e) {
            // Mapeo Tizen común
            const key = e.keyCode || e.which;
            if (key === 13 || key === 167 || key === 29443) { // Enter / OK
                e.preventDefault();
                if (!overlay.classList.contains('hidden')) {
                    buttons[focusedIndex].click();
                } else {
                    overlay.classList.remove('hidden');
                }
            } else if (key === 37 || key === 4) { // Izquierda
                e.preventDefault();
                updateFocus(-1);
            } else if (key === 39 || key === 5) { // Derecha
                e.preventDefault();
                updateFocus(1);
            } else if (key === 38) { // Arriba
                e.preventDefault();
                if (overlay.classList.contains('hidden')) overlay.classList.remove('hidden');
            } else if (key === 40) { // Abajo
                e.preventDefault();
                if (overlay.classList.contains('hidden')) overlay.classList.remove('hidden');
            } else if (key === 10009 || key === 8 || key === 27) { // Back / Escape
                e.preventDefault();
                overlay.classList.toggle('hidden');
            }
        });

        // Auto-conectar si hay URL guardada
        if (baseUrl) connect();
    </script>
</body>
</html>
